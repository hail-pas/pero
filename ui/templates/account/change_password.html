{% extends "layouts/account.html" %}
{% block title %}Pero · Change Password{% endblock %}
{% block content %}
<div class="page-heading"><div><h1 data-i18n="change.title">修改密码</h1><p data-i18n="change.subtitle">定期修改密码有助于保护您的账户安全</p></div></div>
<section class="card-panel form-card">
  <form class="stack" method="post" action="/account/change-password" data-ajax-form data-password-confirm data-toast-i18n="toast.passwordUpdated" novalidate>
    <label class="field has-action"><span data-i18n="field.currentPassword">当前密码</span><input name="old_password" type="password" required placeholder="请输入当前密码" data-i18n-placeholder="field.currentPasswordPlaceholder" /><button class="input-action" type="button" data-toggle-password>👁</button></label>
    <label class="field has-action"><span data-i18n="field.newPassword">新密码</span><input name="new_password" type="password" minlength="8" maxlength="128" required data-password-strength placeholder="请输入新密码" data-i18n-placeholder="field.newPasswordPlaceholder" /><button class="input-action" type="button" data-toggle-password>👁</button></label>
    <label class="field has-action"><span data-i18n="field.confirmPassword">确认新密码</span><input name="confirm_password" type="password" minlength="8" maxlength="128" required placeholder="请再次输入新密码" data-i18n-placeholder="field.confirmPasswordPlaceholder" /><button class="input-action" type="button" data-toggle-password>👁</button></label>
    <div class="strength-row"><span data-i18n="change.strength">密码强度</span><div class="password-meter" data-password-meter><span></span><span></span><span></span><span></span></div><strong data-strength-text>—</strong></div>
    <div class="rule-card">
      <strong data-i18n="change.rules">密码规则</strong>
      <ul>
        <li data-i18n="reset.ruleLen">8-128 个字符</li>
        <li data-i18n="reset.ruleLetters">至少包含字母和数字</li>
        <li data-i18n="reset.ruleSpecial">至少包含一个特殊字符</li>
        <li data-i18n="change.ruleReuse">不能与最近使用的密码相同</li>
      </ul>
    </div>
    <button class="btn primary full" type="submit" data-i18n="common.saveChanges">保存更改</button>
  </form>
</section>
{% endblock %}
