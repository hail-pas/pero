<!doctype html>
<html lang="zh-CN">
<head>
  <script>try{document.documentElement.lang=(localStorage.getItem('pero.lang')||'zh')==='en'?'en':'zh-CN'}catch(e){}</script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Pero{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body class="auth-body">
  <main class="auth-shell">
    <section class="auth-main">
      <div class="top-tools auth-tools">
        <button class="lang-pill is-active" type="button" data-lang="zh">中</button>
        <button class="lang-pill" type="button" data-lang="en">EN</button>
      </div>
      {% block content %}{% endblock %}
    </section>
  </main>
  <div class="toast" data-toast role="status" aria-live="polite"></div>
  <script src="/static/js/i18n.js"></script>
  <script src="/static/js/app.js"></script>
  <script src="/static/js/csrf.js"></script>
  <script src="/static/js/forms.js"></script>
  <script src="/static/js/navigation.js"></script>
  <script src="/static/js/account_sessions.js"></script>
  <script src="/static/js/account_social.js"></script>
</body>
</html>
