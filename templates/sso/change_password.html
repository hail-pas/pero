{% extends "sso/layout.html" %}

{% block title %}Change password - Pero{% endblock %}

{% block content %}
<h2>Change password</h2>
{% if let Some(e) = error %}
<div class="error-box">{{ e }}</div>
{% endif %}
{% if let Some(s) = success %}
<div class="success-box">{{ s }}</div>
{% endif %}
<form method="post" action="/sso/change-password?{{ query_params }}">
    <label for="old_password">Current password</label>
    <input type="password" name="old_password" id="old_password" required minlength="8" maxlength="128">
    <label for="new_password">New password</label>
    <input type="password" name="new_password" id="new_password" required minlength="8" maxlength="128">
    <button type="submit" class="btn">Update password</button>
</form>
<div class="links">
    <a href="/sso/consent?{{ query_params }}">Back to consent</a>
</div>
{% endblock %}
