{% extends "layouts/auth.html" %}
{% block title %}Pero · Forgot Password{% endblock %}
{% block content %}
<div class="auth-card split-card narrow">
  <section class="auth-hero-panel">
    <a class="brand compact" href="/login"><span class="logo-mark">P</span><span>Pero</span></a>
    <h2 data-i18n="forgot.title">找回密码</h2>
    <p class="accent-copy">Forgot your password?</p>
    <p data-i18n="forgot.desc">输入您的邮箱或手机号，我们将发送重置链接给您。</p>
    <div class="glass-illustration lock" aria-hidden="true"></div>
  </section>

  <section class="form-panel center-y">
    <form class="stack" data-form="forgot" novalidate>
      <label class="field"><span data-i18n="field.emailOrPhone">邮箱 / 手机号</span><input name="identifier" required placeholder="Email / Phone" /></label>
      <button class="btn primary full" type="submit" data-i18n="forgot.submit">发送重置链接</button>
      <div class="notice success{% if !success %} hidden{% endif %}" data-form-success><strong>✓</strong><span data-i18n="forgot.sent">如果该账户存在，重置链接已发送。</span></div>
      <a class="center-link" href="/login" data-i18n="common.backToLogin">返回登录</a>
    </form>
  </section>
</div>
{% endblock %}
