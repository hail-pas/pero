{% extends "sso/layout.html" %}

{% block title %}Consent - Pero{% endblock %}

{% block content %}
<h2>Permission request</h2>
<p class="client-name">{{ client_name }} would like to:</p>
<ul class="scopes-list">
{% for scope in scopes %}
    <li>{{ scope }}</li>
{% endfor %}
</ul>
{% if let Some(e) = error %}
<div class="error-box">{{ e }}</div>
{% endif %}
<form method="post" action="/sso/consent?{{ query_params }}">
    <div class="btn-row">
        <button type="submit" name="action" value="deny" class="btn btn-cancel">Cancel</button>
        <button type="submit" name="action" value="allow" class="btn">Allow</button>
    </div>
</form>
<div class="links">
    <a href="/sso/change-password?{{ query_params }}">Change password</a>
</div>
{% endblock %}
