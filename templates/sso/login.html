{% extends "sso/layout.html" %}

{% block title %}Sign in - Pero{% endblock %}

{% block content %}
<h2>Sign in</h2>
{% if let Some(name) = client_name %}
<p class="client-name">to {{ name }}</p>
{% endif %}

{% if let Some(e) = error %}
<div class="error-box">{{ e }}</div>
{% endif %}

<form method="post" action="/sso/login?{{ query_params }}">
    <div class="tabs" id="id-tabs">
        <button type="button" class="tab {% if identifier_type == "email" %}{% else %}{% if identifier_type == "phone" %}{% else %}active{% endif %}{% endif %}" data-type="username" onclick="switchTab('username')">Username</button>
        <button type="button" class="tab {% if identifier_type == "email" %}active{% endif %}" data-type="email" onclick="switchTab('email')">Email</button>
        <button type="button" class="tab {% if identifier_type == "phone" %}active{% endif %}" data-type="phone" onclick="switchTab('phone')">Phone</button>
    </div>
    <input type="hidden" name="identifier_type" id="identifier_type" value="{{ identifier_type }}">
    <label for="identifier" id="identifier-label">Username</label>
    <input type="text" name="identifier" id="identifier" value="{{ identifier }}" autocomplete="username" required>
    <label for="password">Password</label>
    <input type="password" name="password" id="password" autocomplete="current-password" required>
    <button type="submit" class="btn">Sign in</button>
</form>
<div class="links">
    <a href="/sso/register?{{ query_params }}">Create an account</a>
    &nbsp;&middot;&nbsp;
    <a href="/sso/forgot-password?{{ query_params }}">Forgot password?</a>
</div>
<script>
function switchTab(type) {
    document.getElementById('identifier_type').value = type;
    document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
    document.querySelector('.tab[data-type="' + type + '"]').classList.add('active');
    var label = document.getElementById('identifier-label');
    if (type === 'email') label.textContent = 'Email';
    else if (type === 'phone') label.textContent = 'Phone';
    else label.textContent = 'Username';
}
</script>
{% endblock %}
