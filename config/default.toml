[server]
host = "0.0.0.0"
port = 8080
request_body_limit_bytes = 1048576
rate_limit_rpm = 888

[database]
url = "postgres://pero:112358@localhost/pero"
max_connections = 20
min_connections = 5

[redis]
url = "redis://default@127.0.0.1:6379"
pool_size = 10

[jwt]
access_ttl_minutes = 15
refresh_ttl_days = 30

[log]
level = "info"
dir = "./logs"
rotation = "day"

[abac]
default_action = "deny"
policy_cache_ttl_seconds = 300

[oidc]
issuer = "http://localhost:8080"
private_key_path = "./config/keys/private.pem"
public_key_path = "./config/keys/public.pem"
key_id = "key-2026-01"

[oauth2]
auth_code_ttl_minutes = 10
access_token_ttl_minutes = 15
refresh_token_ttl_days = 30

[sso]
session_ttl_seconds = 600
cookie_secure = false
cookie_same_site = "Lax"

[docs]
servers = [
    { url = "http://localhost:8080", description = "Development" },
]

[cors]
allow_origins = ["*"]
allow_methods = ["*"]
allow_headers = ["*"]
